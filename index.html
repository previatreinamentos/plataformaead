<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plataforma de Treinamentos - Previa</title>
  <style>
    :root { --primary: #0f172a; --accent: #2563eb; --success: #10b981; --bg: #f1f5f9; --text: #334155; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); }
    
    .container { display: flex; gap: 25px; max-width: 1400px; margin: 0 auto; padding: 30px; box-sizing: border-box; }
    .sidebar { width: 35%; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); height: calc(100vh - 100px); overflow-y: auto; }
    .main-content { width: 65%; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: center; min-height: 450px; }
    
    .card-aula { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 15px; cursor: pointer; transition: all 0.25s ease; position: relative; display: flex; flex-direction: column; gap: 10px; }
    .card-aula:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 12px 20px -8px rgba(37,99,235,0.15); }
    .card-aula.ativa { border-color: var(--accent); background: #eff6ff; }
    .card-titulo { font-weight: 600; font-size: 16px; color: var(--primary); padding-right: 90px; }
    
    .badge { position: absolute; top: 20px; right: 20px; padding: 5px 10px; font-size: 11px; font-weight: 700; border-radius: 30px; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge.pendente { background: #fef3c7; color: #d97706; }
    .badge.concluida { background: #dcfce7; color: #16a34a; }
    
    .video-container { width: 100%; display: none; }
    .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    
    .loader-screen { text-align: center; margin-top: 150px; font-size: 18px; font-weight: 600; color: var(--primary); }
    .header-boasvindas { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #f1f5f9; text-align: left; }
    #statusMsg { font-size: 14px; font-weight: 600; margin-top: 15px; text-align: center; }
  </style>
</head>
<body>

  <!-- Tela de Carregamento Inicial -->
  <div id="telaCarregando" class="loader-screen">
    <p>Conectando à planilha de cursos e carregando as aulas...</p>
  </div>

  <!-- Tela Principal da Plataforma -->
  <div id="telaPlataforma" class="container" style="display: none;">
    <div class="sidebar">
      <div class="header-boasvindas">
        <span style="font-size: 13px; color: #64748b; font-weight: 500;">Aluno(a):</span>
        <div id="nomeUsuario" style="font-size: 18px; font-weight: 700; color: var(--primary);">Carregando...</div>
      </div>
      <h4 style="margin: 0 0 15px 0; color: #64748b; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px;">Grade Curricular</h4>
      <div id="listaAulasContainer">Buscando aulas...</div>
    </div>
    
    <div class="main-content">
      <h2 id="tituloAulaAtiva" style="margin: 0 0 20px 0; color: var(--primary); font-size: 24px; text-align: center;">Selecione um módulo ao lado para iniciar</h2>
      <div id="videoContainer" class="video-container">
        <div class="video-wrapper">
          <div id="youtubePlayer"></div>
        </div>
      </div>
      <div id="statusMsg"></div>
    </div>
  </div>

  <!-- API Externa do Player do YouTube -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    // =========================================================================
    // COLE AQUI SUA URL ATUALIZADA DO APPS SCRIPT (LEMBRE-SE DE MANTER O /exec NO FINAL)
    const URL_API = "https://script.google.com/macros/s/AKfycbx-JDfgAHJRvimlqXOeo0scxYZw6WFqeRDwzt6pgOPu2b6xAXoQulxEpsZos6e_f30f9A/exec"; 
    // =========================================================================
    
    let aulaAtualId = "";
    let alunoEmail = "";
    let player = null;
    let bancoAulasGlobais = [];

    // Executa automaticamente ao abrir o site
    window.onload = function() {
      carregarPlataformaDireto();
    };

    function carregarPlataformaDireto() {
      fetch(URL_API, {
        method: "POST",
        body: JSON.stringify({ acao: "buscarDadosIniciais" })
      })
      .then(res => res.json())
      .then(resposta => {
        if (resposta.erro) {
          document.getElementById("telaCarregando").innerHTML = `<p style='color:red;'>${resposta.erro}</p>`;
        } else {
          alunoEmail = resposta.aluno.email;
          bancoAulasGlobais = resposta.aulas;
          
          document.getElementById("nomeUsuario").innerText = resposta.aluno.nome;
          document.getElementById("telaCarregando").style.display = "none";
          document.getElementById("telaPlataforma").style.display = "flex";
          
          renderizarCards(resposta.aulas);
        }
      }).catch(erro => {
        document.getElementById("telaCarregando").innerHTML = "<p style='color:red;'>Erro crítico ao conectar com a planilha de aulas. Verifique se a URL do Script está correta e atualizada.</p>";
      });
    }

    function renderizarCards(aulas) {
      const container = document.getElementById("listaAulasContainer");
      container.innerHTML = "";
      
      if (aulas.length === 0) {
        container.innerHTML = "<div style='color:#64748b; font-size:14px;'>Nenhuma aula encontrada na planilha.</div>";
        return;
      }
      
      aulas.forEach(aula => {
        let card = document.createElement("div");
        card.id = "card-" + aula.id;
        card.className = `card-aula ${aula.id === aulaAtualId ? 'ativa' : ''}`;
        
        let statusTexto = aula.concluida ? "Concluído ✔" : "Pendente";
        let statusClasse = aula.concluida ? "concluida" : "pendente";
        
        card.innerHTML = `
          <div class="card-titulo">${aula.titulo}</div>
          <span class="badge ${statusClasse}">${statusTexto}</span>
        `;
        
        card.onclick = function() { carregarAula(aula); };
        container.appendChild(card);
      });
    }

    function carregarAula(aula) {
      aulaAtualId = aula.id;
      document.getElementById("tituloAulaAtiva").innerText = aula.titulo;
      document.getElementById("statusMsg").innerText = "";
      document.getElementById("videoContainer").style.display = "block";
      
      document.querySelectorAll('.card-aula').forEach(c => c.classList.remove('ativa'));
      document.getElementById("card-" + aula.id).classList.add('ativa');

      if (player) {
        player.loadVideoById({ videoId: aula.video, startSeconds: 0 });
      } else {
        player = new YT.Player('youtubePlayer', {
          height: '100%',
          width: '100%',
          videoId: aula.video,
          playerVars: { 'rel': 0, 'modestbranding': 1, 'controls': 1 },
          events: { 'onStateChange': monitorarFimDoVideo }
        });
      }
    }

    function monitorarFimDoVideo(event) {
      if (event.data === YT.PlayerState.ENDED) {
        let aulaObjeto = bancoAulasGlobais.find(a => a.id === aulaAtualId);
        if (aulaObjeto && aulaObjeto.concluida) { return; }

        document.getElementById("statusMsg").style.color = "#d97706";
        document.getElementById("statusMsg").innerText = "Registrando conclusão automática da aula...";

        fetch(URL_API, {
          method: "POST",
          body: JSON.stringify({ acao: "registrarConclusao", emailAluno: alunoEmail, idAula: aulaAtualId })
        })
        .then(res => res.json())
        .then(() => {
          document.getElementById("statusMsg").style.color = "#16a34a";
          document.getElementById("statusMsg").innerText = "Parabéns! Aula marcada como concluída com sucesso.";
          if(aulaObjeto) aulaObjeto.concluida = true;
          renderizarCards(bancoAulasGlobais);
        });
      }
    }
  </script>
</body>
</html>
